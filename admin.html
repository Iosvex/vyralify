<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Vyralify</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/vyralifylogo.jpeg" />
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body class="app-shell" data-admin="true">
  <a class="skip-link" href="#admin-main">Skip to content</a>

  <nav class="app-nav">
    <div class="container">
      <a class="brand" href="/admin.html">V<i>Y</i>RAL<i>I</i>FY <span style="color:var(--slate);font-size:.8rem">Admin</span></a>
      <div class="dash-actions">
        <a class="btn btn-secondary" href="/dashboard.html">Member view</a>
      </div>
    </div>
  </nav>

  <main id="admin-main" class="container dashboard">
    <header class="dash-head">
      <div class="greeting"><strong>Content &amp; members</strong><small>Manage the resource vault and see who has joined.</small></div>
    </header>

    <section class="dashboard-content card" style="margin-bottom:1rem">
      <h2>Add a content asset</h2>
      <form id="admin-asset-form" class="admin-form">
        <input name="title" type="text" placeholder="Title" required />
        <select name="category" required>
          <option value="foundation">Foundation</option>
          <option value="content">Content &amp; Posting</option>
          <option value="growth">Scaling &amp; Growth</option>
          <option value="monetisation">Monetisation</option>
          <option value="community">Community</option>
        </select>
        <select name="type" required>
          <option value="lesson">Lesson</option>
          <option value="template">Template</option>
          <option value="download">Download</option>
          <option value="video">Video</option>
          <option value="checklist">Checklist</option>
        </select>
        <select name="tierRequired" required>
          <option value="free">Free tier</option>
          <option value="active">Active members only</option>
        </select>
        <input name="order" type="number" placeholder="Order (e.g. 1)" min="0" />
        <input name="url" type="url" placeholder="Link (video/download URL, optional)" />
        <textarea name="body" rows="3" placeholder="Body / notes (optional)"></textarea>
        <button class="btn btn-primary" type="submit">Publish asset</button>
        <p id="admin-status" class="eyebrow"></p>
      </form>
    </section>

    <section class="dashboard-content card" style="margin-bottom:1rem">
      <h2>Content assets</h2>
      <div class="admin-table">
        <table>
          <thead><tr><th>Title</th><th>Category</th><th>Type</th><th>Tier</th><th></th></tr></thead>
          <tbody id="admin-assets"><tr><td colspan="5">Loading…</td></tr></tbody>
        </table>
      </div>
    </section>

    <section class="dashboard-content card">
      <h2>Members</h2>
      <div class="admin-table">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Tier</th><th>Country</th></tr></thead>
          <tbody id="admin-users"><tr><td colspan="4">Loading…</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="/assets/js/admin.js"></script>
</body>
</html>
