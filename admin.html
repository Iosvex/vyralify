<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin — Vyralify</title><link rel="stylesheet" href="/assets/css/tokens.css"><link rel="stylesheet" href="/assets/css/base.css"><link rel="stylesheet" href="/assets/css/app.css"></head><body data-admin="true"><header class="app-nav"><div class="container"><a class="brand" href="/dashboard.html">V<i>Y</i>RAL<i>I</i>FY / Admin</a><button class="btn btn-secondary" onclick="vyralifyLogout()">Log out</button></div></header><main class="dashboard container"><div class="eyebrow">Admin workspace</div><h1>Content publishing</h1><section class="admin-form card"><label>Title<input id="title" placeholder="Lesson or template title"></label><label>Category<select id="category"><option value="foundation">Foundation</option><option value="content">Content &amp; Posting</option><option value="growth">Scaling &amp; Growth</option><option value="monetisation">Monetisation</option><option value="community">Community</option></select></label><label>Access<select id="tier"><option value="free">Free</option><option value="active">Active members</option></select></label><label>Resource URL<input id="url" type="url" placeholder="https://"></label><button id="publish" class="btn btn-primary">Publish resource</button><p id="admin-status" class="form-error"></p></section><section class="card dashboard-content"><h2>Security note</h2><p>Only an authenticated account whose Firestore user record has <code>role: admin</code> can write content or view the admin page. Payment tiers are server-controlled.</p></section></main><script type="module" src="/assets/js/auth.js"></script><script type="module">import {profileReady} from '/assets/js/auth-guard.js';import {db} from '/assets/js/firebase-config.js';import {addDoc,collection,serverTimestamp} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';await profileReady;document.querySelector('#publish').onclick=async()=>{const status=document.querySelector('#admin-status');try{await addDoc(collection(db,'contentAssets'),{title:document.querySelector('#title').value,category:document.querySelector('#category').value,tierRequired:document.querySelector('#tier').value,type:'lesson',url:document.querySelector('#url').value,order:Date.now(),createdAt:serverTimestamp(),updatedAt:serverTimestamp()});status.style.color='var(--success)';status.textContent='Published.'}catch{status.textContent='Could not publish this resource.'}}</script></body></html>
