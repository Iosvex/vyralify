<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Vyralify</title>
  <meta name="description" content="Log in to your Vyralify dashboard." />
  <link rel="icon" href="/vyralifylogo.jpeg" />
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body>
  <nav class="dynamic-island-nav" style="width:min(95%,640px)" role="navigation" aria-label="Auth">
    <a class="nav-brand" href="/">Vyral<span>ify</span></a>
    <a href="/signup.html" style="font-size:0.85rem;font-weight:600;color:var(--text-body)">New here? <span style="color:var(--primary-blue)">Sign up</span></a>
  </nav>

  <main id="main" class="auth-page" style="min-height:100vh;background:var(--bg-secondary)">
    <div style="width:min(100%,460px);padding:1rem">
      <div style="text-align:center;margin-bottom:2rem">
        <h1 style="font-size:clamp(1.6rem,4vw,2.2rem);margin-bottom:0.5rem">Welcome back</h1>
        <p style="color:var(--text-body)">Log in to your Vyralify dashboard.</p>
      </div>

      <div class="card auth-card" style="padding:2rem">
        <div class="form-error" style="display:none;color:var(--danger);font-size:0.85rem;font-weight:600;margin-bottom:1rem;padding:0.7rem 1rem;background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.2);border-radius:10px"></div>

        <form id="login-form" novalidate>
          <div class="auth-form-group">
            <label for="login-email">Email Address</label>
            <input id="login-email" type="email" name="email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="auth-form-group">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" name="password" placeholder="Your password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:1rem;padding:1rem;margin-top:0.5rem">Log In →</button>
        </form>

        <div style="display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0">
          <div style="flex:1;height:1px;background:var(--border-color)"></div>
          <span style="font-size:0.78rem;color:var(--text-muted);font-weight:600">or</span>
          <div style="flex:1;height:1px;background:var(--border-color)"></div>
        </div>

        <button id="google-login" class="btn btn-secondary" style="width:100%;justify-content:center;gap:0.5rem">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
      </div>
      <p style="text-align:center;font-size:0.82rem;color:var(--text-muted);margin-top:1.25rem">
        Don't have an account? <a href="/signup.html" style="color:var(--primary-blue);font-weight:700">Sign up free</a>
      </p>
    </div>
  </main>

  <script type="module" src="/assets/js/auth.js"></script>
  <script>
    const err = document.querySelector('.form-error');
    if (err) {
      const obs = new MutationObserver(() => {
        err.style.display = err.textContent ? 'block' : 'none';
      });
      obs.observe(err, { childList: true, characterData: true, subtree: true });
    }
  </script>
</body>
</html>
